name: Release pi-extension

on:
  push:
    branches: [main]

permissions:
  contents: write       # create tags, push changelog
  pull-requests: write  # open/update the Release PR
  id-token: write       # npm provenance

jobs:
  # ── 1. Maintain the Release PR ─────────────────────────────────────────────
  # On every push to main, release-please inspects conventional commits and
  # updates (or creates) a "chore: release vX.Y.Z" PR with a bumped
  # package.json and CHANGELOG.md. Nothing publishes yet.
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.rp.outputs.releases_created }}
    steps:
      - uses: google-github-actions/release-please-action@v4
        id: rp
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # ── 2. Publish — only when the Release PR is merged ────────────────────────
  # release-please merges its own PR with [skip ci] absent, so this job runs
  # exactly once per intentional release decision.
  publish:
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/pi-extension

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: bun install --frozen-lockfile

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
