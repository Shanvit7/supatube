name: Publish pi-extension

on:
  push:
    branches: [main]
    paths:
      - 'apps/pi-extension/**'
  workflow_dispatch:  # manual trigger from GitHub UI → Actions tab

concurrency:
  group: publish-extension
  cancel-in-progress: false  # never cancel a publish in flight

permissions:
  contents: write  # push version bump + tag + CHANGELOG.md
  id-token: write  # npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/pi-extension

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # git-cliff needs full history
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: bun install --frozen-lockfile

      # ── 1. Bump version ────────────────────────────────────────────────────
      - name: Bump patch version
        id: version
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          NEW_VERSION=$(npm version patch --no-git-tag-version | tr -d 'v')
          echo "new=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      # ── 2. Generate changelog (scoped to this package's path) ───────────────
      - name: Generate changelog
        id: cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: apps/pi-extension/cliff.toml
          args: >-
            --include-path "apps/pi-extension/**"
            --unreleased
            --tag "v${{ steps.version.outputs.new }}"
            --strip header

      # ── 3. Prepend new entry to CHANGELOG.md ───────────────────────────────
      - name: Update CHANGELOG.md
        run: |
          ENTRY="${{ steps.cliff.outputs.changelog }}"
          if [ -f CHANGELOG.md ]; then
            printf '%s\n\n%s' "$ENTRY" "$(cat CHANGELOG.md)" > CHANGELOG.md
          else
            printf '%s\n' "$ENTRY" > CHANGELOG.md
          fi

      # ── 4. Commit, tag, push ───────────────────────────────────────────────
      - name: Commit & tag
        run: |
          git add package.json CHANGELOG.md
          git commit -m "chore(release): v${{ steps.version.outputs.new }} [skip ci]"
          git tag "v${{ steps.version.outputs.new }}"
          git push origin main --follow-tags

      # ── 5. Publish to npm ─────────────────────────────────────────────────
      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ── 6. Create GitHub Release with changelog as body ────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.new }}
          name: v${{ steps.version.outputs.new }}
          body: ${{ steps.cliff.outputs.changelog }}
